name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install build twine

      - name: Check tag matches package versions
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python << 'EOF'
          import os
          import pathlib
          import re
          import tomllib

          tag = os.environ["TAG_NAME"].removeprefix("v")
          with open("pyproject.toml", "rb") as f:
              pyproject = tomllib.load(f)["project"]["version"]
          init = re.search(
              r'__version__\s*=\s*"([^"]+)"',
              pathlib.Path("app/__init__.py").read_text(encoding="utf-8"),
          ).group(1)
          test_assert = re.search(
              r'assert __version__\s*==\s*"([^"]+)"',
              pathlib.Path("tests/test_cli.py").read_text(encoding="utf-8"),
          ).group(1)
          if not (tag == pyproject == init == test_assert):
              raise SystemExit(
                  f"Version mismatch: tag={tag!r} pyproject={pyproject!r} "
                  f"app/__init__.py={init!r} tests/test_cli.py={test_assert!r}"
              )
          EOF

      - name: Run tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: pytest -q -p pytest_asyncio.plugin -p respx.fixtures

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distributions
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create checksums
        run: |
          cd dist
          shasum -a 256 *.tar.gz *.whl > SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" --clobber \
            dist/*.tar.gz \
            dist/*.whl \
            dist/SHA256SUMS \
            --title "${GITHUB_REF_NAME}" \
            --notes-file CHANGELOG.md
