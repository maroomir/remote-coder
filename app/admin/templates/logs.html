<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Remote AI Coder - 서버 로그</title>
  <style>
    :root {
      --bg: #0f1419;
      --bg-elevated: #1a2332;
      --surface: #243044;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8edf4;
      --text-muted: #8b9cb3;
      --accent: #3d9cf5;
      --accent-dim: rgba(61, 156, 245, 0.15);
      --success: #34c759;
      --success-bg: rgba(52, 199, 89, 0.12);
      --danger: #ff453a;
      --danger-bg: rgba(255, 69, 58, 0.12);
      --warning: #ffcc00;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
      --font: "Segoe UI", system-ui, -apple-system, sans-serif;
      --focus: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1e3a5f 0%, var(--bg) 55%);
      padding: 1.25rem 1rem 2.5rem;
    }

    .wrap { max-width: 72rem; margin: 0 auto; }

    .app-header {
      margin-bottom: 1.5rem;
      padding: 1.25rem 1.35rem;
      background: linear-gradient(135deg, var(--bg-elevated) 0%, var(--surface) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .app-header h1 {
      margin: 0 0 0.35rem;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .app-header .tagline {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .localhost-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      margin-top: 0.75rem;
      padding: 0.35rem 0.65rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--warning);
      background: rgba(255, 204, 0, 0.1);
      border: 1px solid rgba(255, 204, 0, 0.25);
      border-radius: 999px;
    }

    .header-row {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }

    .header-icon-nav {
      display: flex;
      flex-shrink: 0;
      gap: 0.35rem;
      align-items: center;
    }

    .header-icon-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.15);
      transition: background 0.15s, border-color 0.15s;
    }

    .header-icon-link:hover {
      background: #2d3d54;
      border-color: rgba(255, 255, 255, 0.12);
    }

    .header-icon-link:focus-visible {
      outline: none;
      box-shadow: var(--focus);
    }

    .header-icon-link.is-current {
      border-color: rgba(61, 156, 245, 0.45);
      background: var(--accent-dim);
    }

    .header-icon-link img {
      display: block;
      width: 1.35rem;
      height: 1.35rem;
    }

    #global-msg {
      margin-bottom: 1rem;
      padding: 0.65rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      display: none;
    }

    #global-msg.is-visible { display: block; }

    #global-msg.msg-err {
      color: #ffb4b0;
      background: var(--danger-bg);
      border: 1px solid rgba(255, 69, 58, 0.35);
    }

    section.card {
      margin-bottom: 1.25rem;
      padding: 1.25rem 1.35rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    section.card h2 {
      margin: 0 0 0.5rem;
      font-size: 1.05rem;
      font-weight: 700;
    }

    section.card > .lead {
      margin: 0 0 1rem;
      color: var(--text-muted);
      font-size: 0.88rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem 0.75rem;
      align-items: flex-end;
      margin-bottom: 0.85rem;
    }

    .field-inline {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      min-width: 0;
    }

    .field-inline label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
    }

    .field-inline input,
    .field-inline select {
      font-family: inherit;
      font-size: 0.88rem;
      padding: 0.45rem 0.55rem;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      min-width: 0;
    }

    .field-inline input:focus,
    .field-inline select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .field-inline.narrow { width: 7rem; }
    .field-inline.wide { flex: 1 1 10rem; max-width: 16rem; }

    .checks {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem 1rem;
      align-items: center;
      font-size: 0.88rem;
      font-weight: 600;
    }

    .checks label {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      cursor: pointer;
    }

    .checks input { width: auto; margin: 0; }

    button {
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.45rem 0.75rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, opacity 0.15s;
    }

    button:hover:not(:disabled) {
      background: #2d3d54;
      border-color: rgba(255, 255, 255, 0.12);
    }

    button:focus-visible {
      outline: none;
      box-shadow: var(--focus);
    }

    button.btn-primary {
      background: var(--accent);
      border-color: transparent;
      color: #0a1628;
    }

    button.btn-primary:hover:not(:disabled) {
      background: #5aadf7;
    }

    .console-wrap {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: #0a0e14;
      overflow: hidden;
    }

    .console-meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.45rem 0.65rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      background: rgba(0, 0, 0, 0.35);
      border-bottom: 1px solid var(--border);
    }

    #console {
      margin: 0;
      padding: 0.65rem 0.75rem;
      min-height: 18rem;
      max-height: min(70vh, 36rem);
      overflow-y: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.78rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      color: #c8d4e0;
    }

    .log-line { margin: 0 0 0.2rem; }
    .log-line .ts { color: #6b7c93; }
    .log-line .lvl { font-weight: 700; margin: 0 0.35rem; }
    .log-line .lvl-DEBUG { color: #8b9cb3; }
    .log-line .lvl-INFO { color: #7ec8ff; }
    .log-line .lvl-WARNING { color: var(--warning); }
    .log-line .lvl-ERROR, .log-line .lvl-CRITICAL { color: #ff8a80; }
    .log-line .name { color: #9ad59a; }
    .log-line .msg { color: #e8edf4; }
    .log-tags {
      display: inline-flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      align-items: center;
      margin-left: 0.25rem;
      vertical-align: middle;
    }
    .tag {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 0.12rem 0.4rem;
      border-radius: 4px;
      border: 1px solid rgba(61, 156, 245, 0.35);
      background: var(--accent-dim);
      color: var(--accent);
      cursor: pointer;
      user-select: none;
    }
    .tag:hover { filter: brightness(1.12); }
    .log-exc {
      margin: 0.15rem 0 0.35rem 1rem;
      padding: 0.35rem 0.5rem;
      border-left: 2px solid rgba(255, 69, 58, 0.45);
      color: #ffb4b0;
      white-space: pre-wrap;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(10.5rem, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .stat-card {
      padding: 1rem 1.1rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }

    .stat-card .label {
      margin: 0;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    .stat-card .value {
      margin: 0.25rem 0 0;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text);
    }

    .stat-card .sub {
      margin: 0.2rem 0 0;
      font-size: 0.78rem;
      color: var(--text-muted);
      word-break: break-all;
    }

    @media (max-width: 640px) {
      .app-header h1 { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="app-header">
      <div class="header-row">
        <div>
          <h1>서버 로그</h1>
          <p class="tagline"><code>app</code> 패키지 로거에 쌓인 최근 로그입니다. 자동 새로고침으로 실시간에 가깝게 볼 수 있습니다.</p>
        </div>
        <nav class="header-icon-nav" aria-label="페이지 이동">
          <a href="/" class="header-icon-link" title="관리 홈" aria-label="관리 홈">
            <img src="/admin-static/icons/home.svg" width="22" height="22" alt="" />
          </a>
          <a href="/projects" class="header-icon-link" title="프로젝트 등록" aria-label="프로젝트 등록">
            <img src="/admin-static/icons/projects.svg" width="22" height="22" alt="" />
          </a>
          <a href="/advanced" class="header-icon-link" title="고급 설정" aria-label="고급 설정">
            <img src="/admin-static/icons/advanced.svg" width="22" height="22" alt="" />
          </a>
          <a href="/logs" class="header-icon-link is-current" title="서버 로그" aria-label="서버 로그">
            <img src="/admin-static/icons/logs.svg" width="22" height="22" alt="" />
          </a>
          <a href="/database" class="header-icon-link" title="데이터 조회" aria-label="데이터 조회">
            <img src="/admin-static/icons/database.svg" width="22" height="22" alt="" />
          </a>
        </nav>
      </div>
      <span class="localhost-pill" aria-hidden="true">로컬 전용</span>
      <p class="tagline" style="margin-top:0.65rem">이 페이지는 <strong>127.0.0.1</strong>에서만 열립니다.</p>
    </header>

    <div id="global-msg" role="status" aria-live="polite"></div>

    <div class="summary-grid" id="summary-grid" aria-label="요약"></div>

    <section class="card" aria-labelledby="logs-heading">
      <h2 id="logs-heading">콘솔</h2>
      <p class="lead">레벨은 <strong>최소</strong> 기준입니다. 검색어는 메시지·예외 텍스트에 부분 일치합니다. 배지를 클릭하면 해당 필터가 채워집니다.</p>

      <div class="toolbar">
        <div class="field-inline narrow">
          <label for="f-level">레벨</label>
          <select id="f-level" aria-label="최소 로그 레벨">
            <option value="">전체</option>
            <option value="DEBUG">DEBUG</option>
            <option value="INFO">INFO</option>
            <option value="WARNING">WARNING</option>
            <option value="ERROR">ERROR</option>
            <option value="CRITICAL">CRITICAL</option>
          </select>
        </div>
        <div class="field-inline narrow">
          <label for="f-category">카테고리</label>
          <select id="f-category" aria-label="이벤트 카테고리">
            <option value="">전체</option>
            <option value="telegram.inbound">telegram.inbound</option>
            <option value="telegram.outbound">telegram.outbound</option>
            <option value="telegram.command">telegram.command</option>
            <option value="auth.reject">auth.reject</option>
            <option value="job.lifecycle">job.lifecycle</option>
            <option value="git.operation">git.operation</option>
            <option value="ai.runner">ai.runner</option>
          </select>
        </div>
        <div class="field-inline narrow">
          <label for="f-chat-id">chat_id</label>
          <input id="f-chat-id" type="text" inputmode="numeric" placeholder="예: 123" autocomplete="off" />
        </div>
        <div class="field-inline narrow">
          <label for="f-user-id">user_id</label>
          <input id="f-user-id" type="text" inputmode="numeric" placeholder="예: 456" autocomplete="off" />
        </div>
        <div class="field-inline wide">
          <label for="f-job-id">job_id</label>
          <input id="f-job-id" type="text" placeholder="예: job_…" autocomplete="off" />
        </div>
        <div class="field-inline wide">
          <label for="f-project">project</label>
          <input id="f-project" type="text" placeholder="프로젝트 이름" autocomplete="off" />
        </div>
        <div class="field-inline wide">
          <label for="f-logger">로거 (부분 일치)</label>
          <input id="f-logger" type="text" placeholder="예: app.telegram" autocomplete="off" />
        </div>
        <div class="field-inline wide">
          <label for="f-q">검색</label>
          <input id="f-q" type="text" placeholder="메시지·예외" autocomplete="off" />
        </div>
        <div class="field-inline narrow">
          <label for="f-interval">새로고침(초)</label>
          <select id="f-interval" aria-label="자동 새로고침 간격">
            <option value="0">끔</option>
            <option value="1">1</option>
            <option value="2" selected>2</option>
            <option value="5">5</option>
          </select>
        </div>
        <button type="button" class="btn-primary" id="btn-apply">필터 적용</button>
        <button type="button" id="btn-clear-view">화면 비우기</button>
      </div>

      <div class="checks">
        <label><input type="checkbox" id="chk-stick" checked /> 맨 아래로 스크롤</label>
      </div>

      <div class="console-wrap" style="margin-top:0.75rem">
        <div class="console-meta">
          <span id="meta-count">로드 대기</span>
          <span id="meta-max">max_id: —</span>
        </div>
        <div id="console" role="log" aria-live="polite" aria-relevant="additions"></div>
      </div>
    </section>
  </div>

  <script src="/admin-static/summary.js"></script>
  <script>
    const $ = (s) => document.querySelector(s);
    const globalMsg = $("#global-msg");
    const consoleEl = $("#console");
    const seen = new Set();
    let lastMaxId = 0;
    let pollTimer = null;

    function setGlobalMsg(kind, text) {
      if (!text) {
        globalMsg.textContent = "";
        globalMsg.className = "";
        return;
      }
      globalMsg.textContent = text;
      globalMsg.className =
        "is-visible " + (kind === "err" ? "msg-err" : "msg-info");
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    function buildQuery(extra) {
      const params = new URLSearchParams();
      const level = $("#f-level").value;
      const category = $("#f-category").value.trim();
      const chatId = $("#f-chat-id").value.trim();
      const userId = $("#f-user-id").value.trim();
      const jobId = $("#f-job-id").value.trim();
      const project = $("#f-project").value.trim();
      const logger = $("#f-logger").value.trim();
      const q = $("#f-q").value.trim();
      if (level) params.set("level", level);
      if (category) params.set("category", category);
      if (chatId) params.set("chat_id", chatId);
      if (userId) params.set("user_id", userId);
      if (jobId) params.set("job_id", jobId);
      if (project) params.set("project", project);
      if (logger) params.set("logger", logger);
      if (q) params.set("q", q);
      params.set("limit", "400");
      if (extra && typeof extra.after_id === "number" && extra.after_id > 0) {
        params.set("after_id", String(extra.after_id));
      }
      return params.toString();
    }

    function tagSpan(filter, value, label) {
      const v = String(value);
      return (
        '<span class="tag" role="button" tabindex="0" data-filter="' +
        escapeHtml(filter) +
        '" data-value="' +
        escapeHtml(v) +
        '">' +
        escapeHtml(label) +
        "</span>"
      );
    }

    function formatLine(e) {
      const lvl = escapeHtml(e.level || "");
      const ts = escapeHtml(e.created_at || "");
      const name = escapeHtml(e.logger || "");
      const msg = escapeHtml(e.message || "");
      let badges = "";
      if (e.category) badges += tagSpan("category", e.category, e.category);
      if (e.chat_id != null && e.chat_id !== "") badges += tagSpan("chat_id", e.chat_id, "chat:" + e.chat_id);
      if (e.user_id != null && e.user_id !== "") badges += tagSpan("user_id", e.user_id, "user:" + e.user_id);
      if (e.job_id) badges += tagSpan("job_id", e.job_id, "job:" + e.job_id);
      if (e.project) badges += tagSpan("project", e.project, "proj:" + e.project);
      let html = '<div class="log-line" data-id="' + escapeHtml(String(e.id)) + '">';
      html += '<span class="ts">' + ts + "</span>";
      html += '<span class="lvl lvl-' + lvl + '">' + lvl + "</span>";
      if (badges) html += '<span class="log-tags">' + badges + "</span>";
      html += '<span class="name">' + name + "</span>";
      html += '<span class="msg"> — ' + msg + "</span></div>";
      if (e.exception) {
        html += '<pre class="log-exc">' + escapeHtml(e.exception) + "</pre>";
      }
      return html;
    }

    function scrollToBottom() {
      if (!$("#chk-stick").checked) return;
      consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    async function fetchLogs(extra) {
      const qs = buildQuery(extra || {});
      const r = await fetch("/api/logs?" + qs);
      const raw = await r.text();
      if (!r.ok) {
        let detail = raw || "요청 실패 (" + r.status + ")";
        try {
          const j = JSON.parse(raw);
          if (j && typeof j.detail === "string") detail = j.detail;
        } catch (_) { /* ignore */ }
        throw new Error(detail);
      }
      return JSON.parse(raw);
    }

    function applyEntries(entries, append) {
      if (!append) {
        consoleEl.innerHTML = "";
        seen.clear();
      }
      for (const e of entries) {
        const id = Number(e.id);
        if (seen.has(id)) continue;
        seen.add(id);
        consoleEl.insertAdjacentHTML("beforeend", formatLine(e));
      }
      $("#meta-count").textContent = "표시 줄 수: " + seen.size;
      scrollToBottom();
    }

    async function loadFull() {
      setGlobalMsg("", "");
      const d = await fetchLogs({});
      lastMaxId = Number(d.max_id) || 0;
      $("#meta-max").textContent = "max_id: " + (lastMaxId || "—");
      applyEntries(d.entries || [], false);
    }

    async function pollTail() {
      try {
        const d = await fetchLogs({ after_id: lastMaxId > 0 ? lastMaxId : undefined });
        lastMaxId = Number(d.max_id) || lastMaxId;
        $("#meta-max").textContent = "max_id: " + lastMaxId;
        if ((d.entries || []).length) {
          applyEntries(d.entries, true);
          $("#meta-count").textContent = "표시 줄 수: " + seen.size;
        }
      } catch (e) {
        setGlobalMsg("err", String(e));
      }
    }

    function restartPoll() {
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
      const sec = Number($("#f-interval").value);
      if (sec > 0) {
        pollTimer = setInterval(pollTail, sec * 1000);
      }
    }

    async function applyFiltersFromUi() {
      try {
        await loadFull();
        restartPoll();
      } catch (e) {
        setGlobalMsg("err", String(e));
      }
    }

    $("#btn-apply").addEventListener("click", () => {
      applyFiltersFromUi();
    });

    consoleEl.addEventListener("click", (ev) => {
      const t = ev.target.closest(".tag[data-filter]");
      if (!t) return;
      const kind = t.getAttribute("data-filter");
      const val = t.getAttribute("data-value") || "";
      if (kind === "category") $("#f-category").value = val;
      else if (kind === "chat_id") $("#f-chat-id").value = val;
      else if (kind === "user_id") $("#f-user-id").value = val;
      else if (kind === "job_id") $("#f-job-id").value = val;
      else if (kind === "project") $("#f-project").value = val;
      applyFiltersFromUi();
    });

    $("#btn-clear-view").addEventListener("click", () => {
      consoleEl.innerHTML = "";
      seen.clear();
      lastMaxId = 0;
      $("#meta-count").textContent = "표시 줄 수: 0";
      $("#meta-max").textContent = "max_id: —";
    });

    $("#f-interval").addEventListener("change", restartPoll);

    (async function init() {
      adminSummary.loadSummaryGrid();
      await applyFiltersFromUi();
    })();
  </script>
</body>
</html>
