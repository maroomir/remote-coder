<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Remote AI Coder - 관리</title>
  <style>
    :root {
      --bg: #0f1419;
      --bg-elevated: #1a2332;
      --surface: #243044;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8edf4;
      --text-muted: #8b9cb3;
      --accent: #3d9cf5;
      --accent-dim: rgba(61, 156, 245, 0.15);
      --success: #34c759;
      --success-bg: rgba(52, 199, 89, 0.12);
      --danger: #ff453a;
      --danger-bg: rgba(255, 69, 58, 0.12);
      --warning: #ffcc00;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
      --font: "Segoe UI", system-ui, -apple-system, sans-serif;
      --focus: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1e3a5f 0%, var(--bg) 55%);
      padding: 1.25rem 1rem 2.5rem;
    }

    .wrap { max-width: 56rem; margin: 0 auto; }

    .app-header {
      margin-bottom: 1.5rem;
      padding: 1.25rem 1.35rem;
      background: linear-gradient(135deg, var(--bg-elevated) 0%, var(--surface) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .app-header h1 {
      margin: 0 0 0.35rem;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .app-header .tagline {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .localhost-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      margin-top: 0.75rem;
      padding: 0.35rem 0.65rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--warning);
      background: rgba(255, 204, 0, 0.1);
      border: 1px solid rgba(255, 204, 0, 0.25);
      border-radius: 999px;
    }

    #global-msg {
      margin-bottom: 1rem;
      padding: 0.65rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      display: none;
    }

    #global-msg.is-visible { display: block; }

    #global-msg.msg-err {
      color: #ffb4b0;
      background: var(--danger-bg);
      border: 1px solid rgba(255, 69, 58, 0.35);
    }

    #global-msg.msg-ok {
      color: #9ee6b0;
      background: var(--success-bg);
      border: 1px solid rgba(52, 199, 89, 0.35);
    }

    #global-msg.msg-info {
      color: var(--text-muted);
      background: var(--accent-dim);
      border: 1px solid rgba(61, 156, 245, 0.25);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(10.5rem, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .stat-card {
      padding: 1rem 1.1rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }

    .stat-card .label {
      margin: 0;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    .stat-card .value {
      margin: 0.25rem 0 0;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text);
    }

    .stat-card .sub {
      margin: 0.2rem 0 0;
      font-size: 0.78rem;
      color: var(--text-muted);
      word-break: break-all;
    }

    section.card {
      margin-bottom: 1.25rem;
      padding: 1.25rem 1.35rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    section.card h2 {
      margin: 0 0 0.5rem;
      font-size: 1.05rem;
      font-weight: 700;
    }

    section.card > .lead {
      margin: 0 0 1rem;
      color: var(--text-muted);
      font-size: 0.88rem;
    }

    section.card > .lead code {
      padding: 0.12rem 0.35rem;
      font-size: 0.82em;
      background: var(--surface);
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .settings-meta {
      display: grid;
      gap: 0.65rem;
      font-size: 0.88rem;
      color: var(--text-muted);
    }

    .settings-meta dt {
      margin: 0;
      font-weight: 600;
      color: var(--text);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .settings-meta dd {
      margin: 0.15rem 0 0;
      word-break: break-word;
    }

    .settings-meta .mono {
      font-family: ui-monospace, monospace;
      font-size: 0.82rem;
      color: var(--accent);
    }

    .section-head {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .section-head h2 {
      margin: 0;
    }

    .link-manage {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
    }

    .link-manage:hover {
      text-decoration: underline;
    }

    .active-proj-empty {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .active-proj-list {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .active-proj-item {
      padding: 0.85rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }

    .active-proj-item h3 {
      margin: 0 0 0.45rem;
      font-size: 0.98rem;
      font-weight: 700;
    }

    .active-proj-item h3 code {
      font-family: ui-monospace, monospace;
      font-size: 0.95em;
    }

    .active-proj-dl {
      display: grid;
      gap: 0.45rem;
      margin: 0;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .active-proj-dl > div {
      margin: 0;
    }

    .active-proj-dl dt {
      margin: 0;
      font-weight: 600;
      color: var(--text);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .active-proj-dl dd {
      margin: 0.15rem 0 0;
      word-break: break-word;
    }

    .active-proj-dl .mono {
      font-family: ui-monospace, monospace;
      font-size: 0.78rem;
      color: var(--accent);
    }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.45rem;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border-radius: 4px;
      margin-left: 0.35rem;
      vertical-align: middle;
    }

    .badge-default {
      color: #7ec8ff;
      background: var(--accent-dim);
      border: 1px solid rgba(61, 156, 245, 0.35);
    }

    .header-row {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }

    .header-icon-nav {
      display: flex;
      flex-shrink: 0;
      gap: 0.35rem;
      align-items: center;
    }

    .header-icon-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.15);
      transition: background 0.15s, border-color 0.15s;
    }

    .header-icon-link:hover {
      background: #2d3d54;
      border-color: rgba(255, 255, 255, 0.12);
    }

    .header-icon-link:focus-visible {
      outline: none;
      box-shadow: var(--focus);
    }

    .header-icon-link.is-current {
      border-color: rgba(61, 156, 245, 0.45);
      background: var(--accent-dim);
    }

    .header-icon-link img {
      display: block;
      width: 1.35rem;
      height: 1.35rem;
    }

    @media (max-width: 640px) {
      .app-header h1 { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="app-header">
      <div class="header-row">
        <div>
          <h1>Remote AI Coder</h1>
          <p class="tagline">로컬 관리 UI</p>
        </div>
        <nav class="header-icon-nav" aria-label="빠른 이동">
          <a href="/" class="header-icon-link is-current" title="관리 홈" aria-label="관리 홈">
            <img src="/admin-static/icons/home.svg" width="22" height="22" alt="" />
          </a>
          <a href="/projects" class="header-icon-link" title="프로젝트 등록" aria-label="프로젝트 등록">
            <img src="/admin-static/icons/projects.svg" width="22" height="22" alt="" />
          </a>
          <a href="/advanced" class="header-icon-link" title="고급 설정" aria-label="고급 설정">
            <img src="/admin-static/icons/advanced.svg" width="22" height="22" alt="" />
          </a>
          <a href="/logs" class="header-icon-link" title="서버 로그" aria-label="서버 로그">
            <img src="/admin-static/icons/logs.svg" width="22" height="22" alt="" />
          </a>
          <a href="/database" class="header-icon-link" title="데이터 조회" aria-label="데이터 조회">
            <img src="/admin-static/icons/database.svg" width="22" height="22" alt="" />
          </a>
        </nav>
      </div>
      <span class="localhost-pill" aria-hidden="true">로컬 전용</span>
      <p class="tagline" style="margin-top:0.65rem">이 페이지는 <strong>127.0.0.1</strong>에서만 열립니다.</p>
    </header>

    <div id="global-msg" role="status" aria-live="polite"></div>

    <div class="summary-grid" id="summary-grid" aria-label="요약"></div>

    <section class="card" aria-labelledby="active-projects-heading">
      <div class="section-head">
        <h2 id="active-projects-heading">활성 프로젝트</h2>
        <a href="/projects" class="link-manage">등록·편집</a>
      </div>
      <p class="lead">활성화된 프로젝트만 표시합니다. 추가·비활성·삭제는 프로젝트 등록 화면에서 할 수 있습니다.</p>
      <div id="active-projects-view" aria-live="polite"></div>
    </section>

    <section class="card" aria-labelledby="settings-heading">
      <h2 id="settings-heading">환경 요약</h2>
      <p class="lead">등록 파일 경로와 텔레그램 관련 설정(마스킹)입니다. Webhook은 스크립트로 등록합니다.</p>
      <dl class="settings-meta" id="settings-meta"></dl>
    </section>
  </div>

  <script src="/admin-static/summary.js"></script>
  <script>
    const $ = (s) => document.querySelector(s);
    const globalMsg = $("#global-msg");

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    function setGlobalMsg(kind, text) {
      if (!text) {
        globalMsg.textContent = "";
        globalMsg.className = "";
        return;
      }
      globalMsg.textContent = text;
      globalMsg.className =
        "is-visible " + (kind === "err" ? "msg-err" : kind === "ok" ? "msg-ok" : "msg-info");
    }

    async function parseApiError(r, rawText) {
      const ct = (r.headers.get("content-type") || "").toLowerCase();
      if (ct.includes("application/json")) {
        try {
          const j = JSON.parse(rawText);
          if (j && typeof j.detail === "string") return j.detail;
          if (Array.isArray(j.detail)) {
            return j.detail.map((d) => (typeof d.msg === "string" ? d.msg : JSON.stringify(d))).join("\n");
          }
        } catch (_) { /* ignore */ }
      }
      return rawText || "요청 실패 (" + r.status + ")";
    }

    function renderActiveProjects(projectsPayload) {
      const container = $("#active-projects-view");
      const defaultName = projectsPayload.default_project || "";
      const active = (projectsPayload.projects || [])
        .filter((p) => p.enabled)
        .sort((a, b) => String(a.name).localeCompare(String(b.name), "ko"));

      if (!active.length) {
        container.innerHTML =
          '<p class="active-proj-empty">활성화된 프로젝트가 없습니다. ' +
          '<a href="/projects" class="link-manage">프로젝트 등록</a>에서 추가·활성화할 수 있습니다.</p>';
        return;
      }

      const items = active
        .map((p) => {
          const isDef = p.name === defaultName;
          const badge = isDef ? '<span class="badge badge-default">폴백 기본</span>' : "";
          return `<li class="active-proj-item">
          <h3><code>${escapeHtml(p.name)}</code>${badge}</h3>
          <dl class="active-proj-dl">
            <div><dt>루트</dt><dd class="mono">${escapeHtml(String(p.root_path))}</dd></div>
            <div><dt>워크트리</dt><dd class="mono">${escapeHtml(String(p.worktree_base_dir))}</dd></div>
            <div><dt>기본 모델</dt><dd>${escapeHtml(String(p.default_model))}</dd></div>
          </dl>
        </li>`;
        })
        .join("");

      container.innerHTML = `<ul class="active-proj-list">${items}</ul>`;
    }

    function renderSettings(settings) {
      const dl = $("#settings-meta");
      const chats = (settings.telegram_allowed_chat_ids || []).join(", ") || "(없음)";
      const users = (settings.telegram_allowed_user_ids || []).join(", ") || "(없음)";
      dl.innerHTML = `
        <div><dt>프로젝트 설정 파일</dt><dd class="mono">${escapeHtml(settings.projects_config_path || "")}</dd></div>
        <div><dt>봇 토큰 (마스킹)</dt><dd class="mono">${escapeHtml(settings.telegram_bot_token_masked || "")}</dd></div>
        <div><dt>허용 Chat ID</dt><dd>${escapeHtml(chats)}</dd></div>
        <div><dt>허용 User ID</dt><dd>${escapeHtml(users)}</dd></div>
        <div><dt>Webhook 시크릿</dt><dd>${settings.telegram_webhook_secret_set ? "설정됨" : "미설정"}</dd></div>
        <div><dt>Webhook 안내</dt><dd>${escapeHtml(settings.webhook_hint || "")}</dd></div>
      `;
    }

    async function loadHub() {
      setGlobalMsg("", "");
      try {
        const result = await adminSummary.loadSummaryGrid((msg) => setGlobalMsg("err", msg));
        if (!result.ok) return;
        renderSettings(result.settings);
        renderActiveProjects(result.projectsPayload);
      } catch (e) {
        setGlobalMsg("err", String(e));
      }
    }

    loadHub();
  </script>
</body>
</html>
